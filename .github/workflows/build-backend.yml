name: Build dos artefatos de Backend do projeto

on:
  workflow_call:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build ms-associados module
        run: mvn -B -f ms-associados/pom.xml clean package -DskipTests
      - name: Build ms-pauta module
        run: mvn -B -f ms-pauta/pom.xml clean package -DskipTests
      - name: Build ms-sessoes module
        run: mvn -B -f ms-sessoes/pom.xml clean package -DskipTests
      - name: Build api-gateway module
        run: mvn -B -f api-gateway/pom.xml clean package -DskipTests
      - name: Build service-discovery module
        run: mvn -B -f service-discovery/pom.xml clean package -DskipTests
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ms-associados-jar
          path: ms-associados/target/*.jar
          retention-days: 1
      - name: Upload EJB Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ms-pauta-jar
          path: ms-pauta/target/*.jar
          retention-days: 1
      - name: Upload Sessoes Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ms-sessoes-jar
          path: ms-sessoes/target/*.jar
          retention-days: 1
      - name: Upload API Gateway Artifact
        uses: actions/upload-artifact@v6
        with:
          name: api-gateway-jar
          path: api-gateway/target/*.jar
          retention-days: 1
      - name: Upload Service Discovery Artifact
        uses: actions/upload-artifact@v6
        with:
          name: service-discovery-jar
          path: service-discovery/target/*.jar
          retention-days: 1
          