name: Build dos artefatos de Frontend do projeto

on:
   workflow_call:

jobs:
   build-frontend:
      runs-on: ubuntu-latest # Use the latest Ubuntu runner
      strategy:
         matrix:
            node-version: [24]
      steps:
         - name: Checkout Repository
           uses: actions/checkout@v6 # Action to checkout your repository code

         - name: Setup Node.js
           uses: actions/setup-node@v6
           with:
              node-version: ${{ matrix.node-version }}
              cache: "npm"
              cache-dependency-path: ./package-lock.json

         - name: Install Dependencies
           working-directory: .
           run: npm ci

         - name: Build Angular Application
           working-directory: .
           run: npm run build

         - name: Upload Frontend Artifact
           uses: actions/upload-artifact@v6
           with:
              name: frontend-dist
              path: ./dist/
              retention-days: 1
