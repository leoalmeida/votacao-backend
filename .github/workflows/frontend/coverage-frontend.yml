name: Frontend Coverage CI Pipeline

on:
   workflow_call:

jobs:
  coverage-frontend:
    name: Validate coverage thresholds and upload report
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite with coverage threshold gate
        run: npm run test:ci:threshold

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/app-frontend/clover.xml
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage-report
          path: frontend/coverage/app-frontend/
          retention-days: 1