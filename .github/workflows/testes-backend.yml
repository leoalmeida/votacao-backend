name: Execução de testes dos artefatos de Backend do projeto

on:
  workflow_call:

jobs:
  test-backend:
    name: Execute Unit tests for Backend Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Roda os testes do módulo ms-associados
        run: mvn -B -f ms-associados/pom.xml clean package
      - name: Roda os testes do módulo ms-pautas
        run: mvn -B -f ms-pautas/pom.xml clean package
      - name: Roda os testes do módulo ms-sessoes
        run: mvn -B -f ms-sessoes/pom.xml clean package
      - name: Roda os testes do módulo api-gateway
        run: mvn -B -f api-gateway/pom.xml clean package
      - name: Roda os testes do módulo service-discovery
        run: mvn -B -f service-discovery/pom.xml clean package
      
      - name: Run Code Quality Analysis do módulo ms-associados
        run: mvn -B -f ms-associados/pom.xml jacoco:report
      - name: Run Code Quality Analysis do módulo ms-pautas
        run: mvn -B -f ms-pautas/pom.xml jacoco:report
      - name: Run Code Quality Analysis do módulo ms-sessoes
        run: mvn -B -f ms-sessoes/pom.xml jacoco:report
      - name: Run Code Quality Analysis do módulo api-gateway
        run: mvn -B -f api-gateway/pom.xml jacoco:report
      - name: Run Code Quality Analysis do módulo service-discovery
        run: mvn -B -f service-discovery/pom.xml jacoco:report

      - name: Upload Coverage Report do módulo ms-associados
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ms-associados/target/site/jacoco/
          retention-days: 1
      - name: Upload Coverage Report do módulo ms-pautas
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ms-pautas/target/site/jacoco/
          retention-days: 1
      - name: Upload Coverage Report do módulo ms-sessoes
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ms-sessoes/target/site/jacoco/
          retention-days: 1
      - name: Upload Coverage Report do módulo api-gateway
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: api-gateway/target/site/jacoco/
          retention-days: 1
      - name: Upload Coverage Report do módulo service-discovery
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: service-discovery/target/site/jacoco/
          retention-days: 1