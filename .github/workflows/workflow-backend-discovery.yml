name: CI Pipeline for discovery Module

on:
  push:
    branches:
      - main

jobs:
  code-quality-discovery:
    uses: ./.github/workflows/code-quality-discovery.yml
    secrets: inherit
  
  test-discovery:
    name: Execute Unit tests for Discovery Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
  
      - name: Roda os testes do módulo service-discovery
        run: mvn -B -f service-discovery/pom.xml clean package
      - name: Run Code Quality Analysis do módulo service-discovery
        run: mvn -B -f service-discovery/pom.xml jacoco:report
      - name: Upload Coverage Report do módulo service-discovery
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: service-discovery/target/site/jacoco/
          retention-days: 1

  build-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build service-discovery module
        run: mvn -B -f service-discovery/pom.xml clean package -DskipTests
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: service-discovery-jar
          path: service-discovery/target/*.jar
          retention-days: 1

