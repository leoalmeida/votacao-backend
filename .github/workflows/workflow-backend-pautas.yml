name: CI Pipeline for ms-pautas Module

on:
  push:
    branches:
      - main

jobs:
  code-quality-pautas:
    uses: ./.github/workflows/code-quality-pautas.yml
    secrets: inherit
  
  test-pautas:
    name: Execute Unit tests for Pautas Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
  
      - name: Roda os testes do módulo ms-pautas
        run: mvn -B -f ms-pautas/pom.xml clean package
      - name: Run Code Quality Analysis do módulo ms-pautas
        run: mvn -B -f ms-pautas/pom.xml jacoco:report
      - name: Upload Coverage Report do módulo ms-pautas
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ms-pautas/target/site/jacoco/
          retention-days: 1

  build-pautas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build ms-pautas module
        run: mvn -B -f ms-pautas/pom.xml clean package -DskipTests
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ms-pautas-jar
          path: ms-pautas/target/*.jar
          retention-days: 1

