name: CI Pipeline for ms-sessoes Module

on:
  push:
    branches:
      - main

jobs:
  code-quality-sessoes:
    name: Lint do módulo ms-sessoes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      #- name: Run spotless check
        run: mvn -B -f ms-sessoes/pom.xml spotless:check

      - name: Run Checkstyle
        run: mvn -B -f ms-sessoes/pom.xml checkstyle:check

      - name: Generate Checkstyle report
        run: mvn -B -f ms-sessoes/pom.xml checkstyle:checkstyle

      - name: Run PMD check
        run: mvn -B -f ms-sessoes/pom.xml pmd:check

      - name: generate PMD report
        run: mvn -B -f ms-sessoes/pom.xml pmd:pmd
      
      - name: Run spotbugs check
        run: mvn -B -f ms-sessoes/pom.xml spotbugs:check

      - name: Generate SpotBugs report
        run: mvn -B -f ms-sessoes/pom.xml spotbugs:spotbugs
  
  test-sessoes:
    needs: [code-quality-sessoes]
    name: Execute Unit tests for Sessoes Module
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
  
      - name: Roda os testes do módulo ms-sessoes
        run: mvn -B -f ms-sessoes/pom.xml clean package
      - name: Run Code Quality Analysis do módulo ms-sessoes
        run: mvn -B -f ms-sessoes/pom.xml jacoco:report
      - name: Upload Coverage Report do módulo ms-sessoes
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: ms-sessoes/target/site/jacoco/
          retention-days: 1

  build-sessoes:
    needs: [test-sessoes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build ms-sessoes module
        run: mvn -B -f ms-sessoes/pom.xml clean package -DskipTests
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ms-sessoes-jar
          path: ms-sessoes/target/*.jar
          retention-days: 1

