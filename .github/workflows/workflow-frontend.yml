name: Frontend Module - CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  code-quality-frontend:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner
      strategy:
         matrix:
            node-version: [24]
      steps:
         - name: Checkout Repository
           uses: actions/checkout@v6 # Action to checkout your repository code

         - name: Setup Node.js
           uses: actions/setup-node@v6
           with:
              node-version: ${{ matrix.node-version }}
              cache: "npm"
              cache-dependency-path: ./package-lock.json

         - name: Install Dependencies
           working-directory: .
           run: npm ci

         - name: Run Prettier check to ensure code formatting
           working-directory: .
           run: npm run prettier

         - name: Run ESLint check to ensure code quality
           working-directory: .
           run: npm run lint -- --fix

  test-frontend:
    needs: [code-quality-frontend]
    runs-on: ubuntu-latest # Use the latest Ubuntu runner
      strategy:
         matrix:
            node-version: [24]
      steps:
         - name: Checkout Repository
           uses: actions/checkout@v6 # Action to checkout your repository code

         - name: Setup Node.js
           uses: actions/setup-node@v6
           with:
              node-version: ${{ matrix.node-version }}
              cache: "npm"
              cache-dependency-path: ./package-lock.json

         - name: Install Dependencies
           working-directory: .
           run: npm ci

         - name: Run Frontend Tests
           working-directory: .
           run: npm test -- --no-watch --coverage

  coverage-frontend:
    needs: [test-frontend]
    name: Frontend Module - Validate coverage thresholds and upload report
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run full test suite with coverage threshold gate
        run: npm run test:ci:threshold

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/app-frontend/clover.xml
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-coverage-report
          path: frontend/coverage/app-frontend/
          retention-days: 1

  build-frontend:
    needs: [coverage-frontend]
    runs-on: ubuntu-latest # Use the latest Ubuntu runner
    strategy:
       matrix:
          node-version: [24]
    steps:
       - name: Checkout Repository
         uses: actions/checkout@v6 # Action to checkout your repository code

       - name: Setup Node.js
         uses: actions/setup-node@v6
         with:
            node-version: ${{ matrix.node-version }}
            cache: "npm"
            cache-dependency-path: ./package-lock.json

       - name: Install Dependencies
         working-directory: .
         run: npm ci

       - name: Build Angular Application
         working-directory: .
         run: npm run build

       - name: Upload Frontend Artifact
         uses: actions/upload-artifact@v6
         with:
            name: frontend-dist
            path: ./dist/
            retention-days: 1

