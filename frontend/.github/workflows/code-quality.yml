name: Code Quality Analysis for Backend Module

on:
   workflow_call:

jobs:
   code-quality-frontend:
      runs-on: ubuntu-latest # Use the latest Ubuntu runner
      strategy:
         matrix:
            node-version: [24]
      steps:
         - name: Checkout Repository
           uses: actions/checkout@v6 # Action to checkout your repository code

         - name: Setup Node.js
           uses: actions/setup-node@v6
           with:
              node-version: ${{ matrix.node-version }}
              cache: "npm"
              cache-dependency-path: ./package-lock.json

         - name: Install Dependencies
           working-directory: .
           run: npm ci

         - name: Run Prettier check to ensure code formatting
           working-directory: .
           run: npm run prettier

         - name: Run Prettier check to ensure code formatting
           working-directory: .
           run: npm run lint -- --fix
